name: Playwright CI
on: [push]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t playwright-qa .

      - name: Run Tests in Container
        run: |
          # We add -t to see the live console output in GitHub Actions
          docker run --name qa-runner playwright-qa
        
      - name: Extract Report
        if: always()
        run: |
          # This pulls the file even if the previous step failed
          docker cp qa-runner:/app/report.html . || echo "Report not found".

      - name: Upload Test Report
        if: always() # Ensure report uploads even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-report
          path: report.html